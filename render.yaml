services:
  - type: web
    name: convert-studio-web
    runtime: static
    buildCommand: npm run build
    staticPublishPath: dist
    domains:
      - fileforma.com
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: CONVERT_API_BASE
        value: https://convert-studio-pdf-api.onrender.com
      - key: GA_MEASUREMENT_ID
        value: G-P9C4P4XG5G

  - type: web
    name: convert-studio-pdf-api
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: CORS_ORIGINS
        value: "*"
      - key: CONVERT_STORAGE_DIR
        value: /tmp/convert-studio
